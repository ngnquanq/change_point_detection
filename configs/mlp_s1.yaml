experiment_name: mlp_s1

simulation:
  n: 100
  N: 10000
  noise_type: S1
  rho: 0.0
  mu_range: [-2.0, 2.0]
  sigma: 1.0
  seed: 42

model:
  architecture: mlp
  mlp_variant: pruned
  use_squared: false
  use_cross_product: false

training:
  epochs: 200
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0
  patience: 20
  val_fraction: 0.1
  augment_reversed: true

localization:
  window_size: 100
  step_size: 1
  rolling_window: 10
  gamma: 0.5
