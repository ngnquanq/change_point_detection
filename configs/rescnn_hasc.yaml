experiment_name: rescnn_hasc

dataset:
  source: hasc
  hasc_dir: data/hasc
  channel: magnitude
  window_size: 100
  stride: 10
  seed: 42

model:
  architecture: rescnn
  n_blocks: 21
  base_channels: 32
  kernel_size: 8
  dropout: 0.3
  use_squared: false
  use_cross_product: false

training:
  epochs: 200
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  patience: 20
  val_fraction: 0.1
  augment_reversed: false

localization:
  window_size: 100
  step_size: 1
  rolling_window: 10
  gamma: 0.5
