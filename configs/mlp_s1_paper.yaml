experiment_name: mlp_s1_paper
models_dir: models

dataset:
  source: simulated
  data_dir: data
  n: 100
  N: 10000
  noise_type: S1
  rho: 0.0
  mu_range: [-2.0, 2.0]
  sigma: 1.0
  snr_based_mu: true
  seed: 42

model:
  architecture: mlp
  mlp_variant: pruned
  use_squared: false
  use_cross_product: false

training:
  epochs: 200
  batch_size: 32
  patience: 20
  val_fraction: 0.1
  augment_reversed: true
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0
    betas: [0.9, 0.999]
  scheduler:
    name: none

localization:
  window_size: 100
  step_size: 1
  rolling_window: 10
  gamma: 0.5
