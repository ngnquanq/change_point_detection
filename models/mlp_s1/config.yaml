experiment_name: mlp_s1
localization:
  gamma: 0.5
  rolling_window: 10
  step_size: 1
  window_size: 100
model:
  architecture: mlp
  base_channels: 32
  kernel_size: 8
  mlp_variant: pruned
  n_blocks: 21
  use_cross_product: false
  use_squared: false
simulation:
  N: 10000
  mu_range:
  - -2.0
  - 2.0
  n: 100
  noise_type: S1
  rho: 0.0
  seed: 42
  sigma: 1.0
training:
  augment_reversed: true
  batch_size: 32
  epochs: 200
  lr: 0.001
  patience: 20
  val_fraction: 0.1
  weight_decay: 0.0
