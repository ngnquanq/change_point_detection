experiment_name: mlp_s2
models_dir: models
dataset:
  source: simulated
  data_dir: data/paper_faithful
  n: 100
  N: 10000
  noise_type: S2
  rho: 0.0
  mu_range:
  - -2.0
  - 2.0
  sigma: 1.0
  cauchy_scale: 0.3
  snr_based_mu: true
  hasc_dir: data/hasc
  channel: magnitude
  window_size: 100
  stride: 10
  seed: 42
model:
  architecture: mlp
  mlp_variant: pruned
  n_blocks: 21
  base_channels: 32
  kernel_size: 8
  dropout: 0.3
  use_squared: false
  use_cross_product: false
training:
  epochs: 200
  batch_size: 32
  patience: 20
  val_fraction: 0.1
  augment_reversed: true
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0
    momentum: 0.9
    betas:
    - 0.9
    - 0.999
  scheduler:
    name: none
    lrf: 0.01
    step_size: 50
    gamma: 0.1
localization:
  window_size: 100
  step_size: 1
  rolling_window: 10
  gamma: 0.5
